apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-service
  namespace: vitalsedge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: device-service
  template:
    metadata:
      labels:
        app: device-service
        tier: services
    spec:
      containers:
      - name: device-service
        image: gcr.io/vitalsedge-monitoring-system/device-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3003
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3003"
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: vitalsedge
        - name: DB_USER
          value: vitalsedge_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vitalsedge-secrets
              key: db_password
        - name: RABBITMQ_URL
          value: amqp://vitalsedge_user:$(RABBITMQ_PASSWORD)@rabbitmq:5672
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vitalsedge-secrets
              key: rabbitmq_password
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true

---
apiVersion: v1
kind: Service
metadata:
  name: device-service
  namespace: vitalsedge
spec:
  selector:
    app: device-service
  ports:
  - name: http
    port: 80
    targetPort: 3003
  type: ClusterIP