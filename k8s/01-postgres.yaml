apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: vitalsedge
data:
  init.sql: |
    CREATE SCHEMA IF NOT EXISTS users;
    CREATE SCHEMA IF NOT EXISTS patients;
    CREATE SCHEMA IF NOT EXISTS devices;
    CREATE SCHEMA IF NOT EXISTS audit;

    CREATE TABLE IF NOT EXISTS users.doctors (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      email VARCHAR(255) UNIQUE NOT NULL,
      password_hash VARCHAR(255) NOT NULL,
      first_name VARCHAR(100) NOT NULL,
      last_name VARCHAR(100) NOT NULL,
      phone VARCHAR(20),
      specialization VARCHAR(100),
      hospital_id UUID,
      department VARCHAR(100),
      status VARCHAR(50) DEFAULT 'PENDING_VERIFICATION',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS patients.patient_records (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      mrn VARCHAR(50) UNIQUE NOT NULL,
      first_name VARCHAR(100) NOT NULL,
      last_name VARCHAR(100) NOT NULL,
      date_of_birth DATE NOT NULL,
      gender VARCHAR(20),
      phone VARCHAR(20),
      email VARCHAR(255),
      medical_conditions TEXT[],
      allergies TEXT[],
      medications TEXT[],
      hospital_id UUID NOT NULL,
      primary_doctor_id UUID NOT NULL,
      status VARCHAR(50) DEFAULT 'ACTIVE',
      enrolled_date TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS devices.device_registry (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      device_id VARCHAR(100) UNIQUE NOT NULL,
      device_type VARCHAR(50) NOT NULL,
      patient_id UUID,
      status VARCHAR(50) DEFAULT 'ACTIVE',
      paired_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS audit.audit_logs (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      action VARCHAR(100) NOT NULL,
      user_id UUID,
      email VARCHAR(255),
      patient_id UUID,
      status VARCHAR(50) NOT NULL,
      ip_address VARCHAR(45),
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: vitalsedge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: vitalsedge
        - name: POSTGRES_USER
          value: vitalsedge_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vitalsedge-secrets
              key: db_password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "pg_isready -U vitalsedge_user"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["/bin/sh", "-c", "pg_isready -U vitalsedge_user"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-sql
        configMap:
          name: postgres-init

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vitalsedge
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP