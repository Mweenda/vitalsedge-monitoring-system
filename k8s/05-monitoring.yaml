apiVersion: v1
kind: Service
metadata:
  name: vitalsedge-monitoring
  namespace: vitalsedge
  labels:
    app: prometheus
spec:
  selector:
    app: vitalsedge-backend
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vitalsedge-monitor
  namespace: vitalsedge
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: vitalsedge-backend
  endpoints:
  - port: metrics
    interval: 15s
    path: /metrics
  namespaceSelector:
    matchNames:
    - vitalsedge
---
apiVersion: monitoring.coreos.com/v1
kind: PodDisruptionBudget
metadata:
  name: vitalsedge-backend-pdb
  namespace: vitalsedge
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vitalsedge-backend
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: vitalsedge-resource-quota
  namespace: vitalsedge
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: vitalsedge-limit-range
  namespace: vitalsedge
spec:
  limits:
  - max:
      cpu: "2"
      memory: 2Gi
    min:
      cpu: 50m
      memory: 128Mi
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 256Mi
    type: Container