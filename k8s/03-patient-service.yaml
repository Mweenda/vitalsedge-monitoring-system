apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: vitalsedge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
        tier: services
    spec:
      containers:
      - name: patient-service
        image: gcr.io/vitalsedge-monitoring-system/patient-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3002
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3002"
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: vitalsedge
        - name: DB_USER
          value: vitalsedge_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vitalsedge-secrets
              key: db_password
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vitalsedge-secrets
              key: redis_password
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true

---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: vitalsedge
spec:
  selector:
    app: patient-service
  ports:
  - name: http
    port: 80
    targetPort: 3002
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: patient-service-hpa
  namespace: vitalsedge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: patient-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70