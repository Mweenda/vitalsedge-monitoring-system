<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="scrollGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9fafb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3f4f6;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1" />
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#f9fafb" />

  <!-- Scroll gradient line at top -->
  <rect y="0" width="1400" height="3" fill="url(#scrollGradient)" opacity="0.7" />

  <!-- Header -->
  <rect y="0" width="1400" height="60" fill="white" />
  <rect y="60" width="1400" height="1" fill="#e5e7eb" />

  <!-- Sidebar -->
  <rect width="280" height="900" fill="white" />
  <rect width="280" height="900" fill="white" stroke="#e5e7eb" stroke-width="1" />

  <!-- Logo area -->
  <circle cx="30" cy="30" r="12" fill="#3b82f6" />
  <text x="50" y="35" font-weight="bold" font-size="14" fill="#1f2937">VitalsEdge</text>

  <!-- Sidebar items -->
  <text x="20" y="100" font-size="11" font-weight="bold" fill="#9ca3af" letter-spacing="1" text-transform="uppercase">Workspace</text>
  <rect x="20" y="115" width="240" height="35" rx="8" fill="#eff6ff" />
  <circle cx="35" cy="135" r="5" fill="#3b82f6" />
  <text x="50" y="140" font-size="13" fill="#1f2937">Overview</text>

  <rect x="20" y="160" width="240" height="35" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1" />
  <circle cx="35" cy="180" r="5" fill="#9ca3af" />
  <text x="50" y="185" font-size="13" fill="#4b5563">Historical Trends</text>

  <rect x="20" y="205" width="240" height="35" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1" />
  <circle cx="35" cy="225" r="5" fill="#9ca3af" />
  <text x="50" y="230" font-size="13" fill="#4b5563">Device Config</text>

  <!-- Main content area -->
  <g transform="translate(300, 80)">
    <!-- Title -->
    <text x="0" y="0" font-size="28" font-weight="bold" fill="#1f2937">Patient overview</text>
    <text x="0" y="25" font-size="13" fill="#6b7280">John Doe</text>

    <!-- Vital Signs Grid -->
    <!-- Card 1: Heart Rate -->
    <rect x="0" y="50" width="260" height="140" rx="16" fill="url(#cardGradient)" stroke="#e5e7eb" stroke-width="1" filter="url(#cardShadow)" />
    <text x="20" y="75" font-size="12" font-weight="bold" fill="#6b7280" letter-spacing="1" text-transform="uppercase">Heart Rate</text>
    <text x="20" y="110" font-size="36" font-weight="bold" font-family="monospace" fill="#1f2937">82</text>
    <text x="215" y="110" font-size="14" fill="#9ca3af">BPM</text>

    <!-- Card 2: SpO2 -->
    <rect x="280" y="50" width="260" height="140" rx="16" fill="url(#cardGradient)" stroke="#e5e7eb" stroke-width="1" filter="url(#cardShadow)" />
    <text x="300" y="75" font-size="12" font-weight="bold" fill="#6b7280" letter-spacing="1" text-transform="uppercase">SpO2</text>
    <text x="300" y="110" font-size="36" font-weight="bold" font-family="monospace" fill="#1f2937">98</text>
    <text x="540" y="110" font-size="14" fill="#9ca3af">%</text>

    <!-- Card 3: Temperature -->
    <rect x="560" y="50" width="260" height="140" rx="16" fill="url(#cardGradient)" stroke="#e5e7eb" stroke-width="1" filter="url(#cardShadow)" />
    <text x="580" y="75" font-size="12" font-weight="bold" fill="#6b7280" letter-spacing="1" text-transform="uppercase">Temperature</text>
    <text x="580" y="110" font-size="36" font-weight="bold" font-family="monospace" fill="#1f2937">37.2</text>
    <text x="820" y="110" font-size="14" fill="#9ca3af">°C</text>

    <!-- Card 4: Glucose -->
    <rect x="840" y="50" width="260" height="140" rx="16" fill="url(#cardGradient)" stroke="#e5e7eb" stroke-width="1" filter="url(#cardShadow)" />
    <text x="860" y="75" font-size="12" font-weight="bold" fill="#6b7280" letter-spacing="1" text-transform="uppercase">Glucose</text>
    <text x="860" y="110" font-size="36" font-weight="bold" font-family="monospace" fill="#1f2937">105</text>
    <text x="1090" y="110" font-size="14" fill="#9ca3af">mg/dL</text>

    <!-- Gradient divider line -->
    <line x1="0" y1="220" x2="1100" y2="220" stroke="url(#scrollGradient)" stroke-width="2" opacity="0.3" />

    <!-- Chart Card -->
    <rect x="0" y="250" width="560" height="320" rx="16" fill="url(#cardGradient)" stroke="#e5e7eb" stroke-width="1" filter="url(#cardShadow)" />
    <text x="20" y="280" font-size="16" font-weight="bold" fill="#1f2937">Heart rate — real-time</text>
    <text x="20" y="300" font-size="12" fill="#6b7280">Last 30 samples with threshold reference</text>

    <!-- Chart placeholder with gradients -->
    <rect x="20" y="320" width="520" height="240" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" />
    
    <!-- Simulated chart line -->
    <polyline points="30,440 50,420 70,430 90,410 110,425 130,415 150,435 170,420 190,435 210,425 230,415 250,430 270,420 290,410 310,425 330,415" 
              stroke="#2563eb" stroke-width="2" fill="none" />
    
    <!-- Chart reference lines -->
    <line x1="20" y1="360" x2="540" y2="360" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,4" opacity="0.5" />
    <text x="545" y="365" font-size="10" fill="#dc2626">Max 100</text>

    <line x1="20" y1="500" x2="540" y2="500" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" opacity="0.5" />
    <text x="545" y="505" font-size="10" fill="#f59e0b">Min 60</text>

    <!-- Alert Log Card -->
    <rect x="590" y="250" width="510" height="320" rx="16" fill="url(#cardGradient)" stroke="#e5e7eb" stroke-width="1" filter="url(#cardShadow)" />
    <text x="610" y="280" font-size="16" font-weight="bold" fill="#1f2937">Anomaly log</text>
    <text x="610" y="300" font-size="12" fill="#6b7280">Edge-detected alerts for this patient</text>

    <!-- Sample alerts -->
    <rect x="610" y="320" width="470" height="70" rx="12" fill="#fef2f2" stroke="#fee2e2" stroke-width="1" />
    <circle cx="630" cy="345" r="4" fill="#dc2626" />
    <text x="650" y="350" font-size="12" font-weight="bold" fill="#7f1d1d" letter-spacing="0.5">TACHYCARDIA</text>
    <text x="650" y="365" font-size="11" fill="#991b1b">Heart rate elevated to 125 BPM</text>
    <text x="650" y="380" font-size="10" fill="#b91c1c">High • 14:32:15</text>

    <rect x="610" y="405" width="470" height="70" rx="12" fill="#fffbeb" stroke="#fef3c7" stroke-width="1" />
    <circle cx="630" cy="430" r="4" fill="#f59e0b" />
    <text x="650" y="435" font-size="12" font-weight="bold" fill="#92400e" letter-spacing="0.5">HYPERGLYCEMIA</text>
    <text x="650" y="450" font-size="11" fill="#b45309">Glucose reading: 280 mg/dL</text>
    <text x="650" y="465" font-size="10" fill="#d97706">Medium • 14:25:42</text>

    <!-- Gradient divider line -->
    <line x1="0" y1="595" x2="1100" y2="595" stroke="url(#scrollGradient)" stroke-width="2" opacity="0.3" />

    <!-- Bottom info card -->
    <rect x="0" y="625" width="1100" height="100" rx="16" fill="url(#cardGradient)" stroke="#e5e7eb" stroke-width="1" filter="url(#cardShadow)" />
    <text x="20" y="650" font-size="14" font-weight="bold" fill="#1f2937">Monitoring status</text>

    <!-- Status badges -->
    <rect x="20" y="665" width="200" height="50" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" />
    <circle cx="35" cy="692" r="6" fill="#3b82f6" />
    <text x="50" y="695" font-size="12" font-weight="bold" fill="#0c4a6e">Telemetry: Live</text>
    <text x="50" y="710" font-size="10" fill="#1e40af">Firebase connected</text>

    <rect x="240" y="665" width="200" height="50" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" />
    <circle cx="255" cy="692" r="6" fill="#10b981" />
    <text x="270" y="695" font-size="12" font-weight="bold" fill="#065f46">Device: Active</text>
    <text x="270" y="710" font-size="10" fill="#047857">Last sync: 5s ago</text>

    <rect x="460" y="665" width="200" height="50" rx="10" fill="#fef2f2" stroke="#fee2e2" stroke-width="1" />
    <circle cx="475" cy="692" r="6" fill="#f3f4f6" />
    <text x="490" y="695" font-size="12" font-weight="bold" fill="#7f1d1d">Open Alerts: 2</text>
    <text x="490" y="710" font-size="10" fill="#991b1b">2 high severity</text>

    <rect x="680" y="665" width="200" height="50" rx="10" fill="#f0fdf4" stroke="#dcfce7" stroke-width="1" />
    <circle cx="695" cy="692" r="6" fill="#22c55e" />
    <text x="710" y="695" font-size="12" font-weight="bold" fill="#166534">HIPAA: Compliant</text>
    <text x="710" y="710" font-size="10" fill="#15803d">Audit logging: ON</text>
  </g>

  <!-- Info text at bottom -->
  <text x="300" y="880" font-size="12" fill="#6b7280">Real-time patient monitoring dashboard • With Medical RAG integration • Code-split optimized build</text>
</svg>
